<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>配對遊戲 - 雙人版</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 600px;
            width: 100%;
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 20px;
            font-size: 2.5em;
        }

        .info-panel {
            display: flex;
            justify-content: space-around;
            margin-bottom: 30px;
            padding: 20px;
            background: #f5f5f5;
            border-radius: 10px;
        }

        .player-info {
            text-align: center;
        }

        .player-name {
            font-size: 1.2em;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .player-1 .player-name {
            color: #667eea;
        }

        .player-2 .player-name {
            color: #764ba2;
        }

        .player-score {
            font-size: 2em;
            font-weight: bold;
            color: #333;
        }

        .active-player {
            background: #fff3cd;
            padding: 5px 15px;
            border-radius: 20px;
            font-weight: bold;
            min-width: 150px;
        }

        .game-board {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin-bottom: 30px;
        }

        .card {
            aspect-ratio: 1;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 2em;
            font-weight: bold;
            transition: all 0.3s ease;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card:hover:not(.flipped):not(.matched) {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
        }

        .card.flipped {
            background: #f0f0f0;
            color: #333;
            cursor: default;
        }

        .card.matched {
            background: #4caf50;
            color: white;
            cursor: default;
        }

        .card.matched:hover {
            transform: none;
        }

        .controls {
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        button {
            padding: 12px 30px;
            font-size: 1em;
            font-weight: bold;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-reset {
            background: #667eea;
            color: white;
        }

        .btn-reset:hover {
            background: #764ba2;
            transform: scale(1.05);
        }

        .game-over {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .game-over.show {
            display: flex;
        }

        .game-over-content {
            background: white;
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            max-width: 400px;
        }

        .game-over-content h2 {
            font-size: 2.5em;
            color: #667eea;
            margin-bottom: 20px;
        }

        .game-over-content p {
            font-size: 1.5em;
            color: #333;
            margin-bottom: 10px;
        }

        .winner {
            color: #4caf50;
            font-weight: bold;
            font-size: 2em;
        }

        .game-over-content button {
            margin-top: 20px;
            background: #667eea;
            color: white;
            padding: 15px 40px;
            font-size: 1.2em;
        }

        .game-over-content button:hover {
            background: #764ba2;
        }

        @media (max-width: 500px) {
            .container {
                padding: 20px;
            }

            h1 {
                font-size: 1.8em;
            }

            .game-board {
                gap: 8px;
            }

            .card {
                font-size: 1.5em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎮 配對遊戲</h1>

        <div class="info-panel">
            <div class="player-info player-1">
                <div class="player-name">玩家 1</div>
                <div class="player-score" id="score1">0</div>
            </div>
            <div class="player-info">
                <div class="active-player" id="current-player">玩家 1 的回合</div>
            </div>
            <div class="player-info player-2">
                <div class="player-name">玩家 2</div>
                <div class="player-score" id="score2">0</div>
            </div>
        </div>

        <div class="game-board" id="game-board"></div>

        <div class="controls">
            <button class="btn-reset" onclick="resetGame()">重新開始</button>
        </div>
    </div>

    <div class="game-over" id="game-over">
        <div class="game-over-content">
            <h2>遊戲結束！</h2>
            <p id="winner-text"></p>
            <p>玩家 1: <span id="final-score1">0</span></p>
            <p>玩家 2: <span id="final-score2">0</span></p>
            <button onclick="resetGame()">再玩一次</button>
        </div>
    </div>

    <script>
        const emojis = ['🐶', '🐱', '🐭', '🐹', '🐰', '🦊', '🐻', '🐼'];
        const cards = [...emojis, ...emojis];
        let gameBoard = [];
        let flipped = [];
        let matched = [];
        let player1Score = 0;
        let player2Score = 0;
        let currentPlayer = 1;
        let canFlip = true;

        function shuffle(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        function initGame() {
            gameBoard = shuffle([...cards]);
            flipped = [];
            matched = [];
            player1Score = 0;
            player2Score = 0;
            currentPlayer = 1;
            canFlip = true;
            renderBoard();
            updateUI();
        }

        function renderBoard() {
            const boardElement = document.getElementById('game-board');
            boardElement.innerHTML = '';
            gameBoard.forEach((emoji, index) => {
                const card = document.createElement('button');
                card.className = 'card';
                card.dataset.index = index;

                if (matched.includes(index)) {
                    card.classList.add('matched');
                    card.textContent = emoji;
                    card.disabled = true;
                } else if (flipped.includes(index)) {
                    card.classList.add('flipped');
                    card.textContent = emoji;
                } else {
                    card.textContent = '?';
                }

                card.addEventListener('click', () => flipCard(index, card));
                boardElement.appendChild(card);
            });
        }

        function flipCard(index, cardElement) {
            if (!canFlip || flipped.includes(index) || matched.includes(index)) {
                return;
            }

            flipped.push(index);
            cardElement.classList.add('flipped');
            cardElement.textContent = gameBoard[index];

            if (flipped.length === 2) {
                canFlip = false;
                checkMatch();
            }
        }

        function checkMatch() {
            const [first, second] = flipped;
            const isMatch = gameBoard[first] === gameBoard[second];

            if (isMatch) {
                matched.push(first, second);
                if (currentPlayer === 1) {
                    player1Score++;
                } else {
                    player2Score++;
                }
                flipped = [];
                canFlip = true;

                if (matched.length === gameBoard.length) {
                    endGame();
                    return;
                }

                renderBoard();
                updateUI();
            } else {
                setTimeout(() => {
                    flipped = [];
                    currentPlayer = currentPlayer === 1 ? 2 : 1;
                    renderBoard();
                    updateUI();
                    canFlip = true;
                }, 1000);
            }
        }

        function updateUI() {
            document.getElementById('score1').textContent = player1Score;
            document.getElementById('score2').textContent = player2Score;
            document.getElementById('current-player').textContent =
                `玩家 ${currentPlayer} 的回合`;
        }

        function endGame() {
            const gameOverDiv = document.getElementById('game-over');
            const winnerText = document.getElementById('winner-text');

            if (player1Score > player2Score) {
                winnerText.innerHTML = '<span class="winner">玩家 1 獲勝！🎉</span>';
            } else if (player2Score > player1Score) {
                winnerText.innerHTML = '<span class="winner">玩家 2 獲勝！🎉</span>';
            } else {
                winnerText.textContent = '平手！';
            }

            document.getElementById('final-score1').textContent = player1Score;
            document.getElementById('final-score2').textContent = player2Score;
            gameOverDiv.classList.add('show');
        }

        function resetGame() {
            document.getElementById('game-over').classList.remove('show');
            initGame();
        }

        // 初始化遊戲
        initGame();
    </script>
</body>
</html>
